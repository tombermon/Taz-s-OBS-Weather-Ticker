<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NWS Weather Alert Ticker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; overflow:hidden; width:1920px; height:120px; font-family:'Barlow Condensed',sans-serif; }

  /* ── DEBUG BAR ── */
  #debug-bar {
    position:fixed; top:0; left:0; width:1920px; height:32px;
    background:rgba(0,0,0,0.92); color:#ccc;
    font:11px/32px 'Courier New',monospace;
    display:flex; align-items:center; z-index:999; overflow:hidden;
  }
  .db-cell { padding:0 12px; border-right:1px solid #333; white-space:nowrap; height:100%; display:flex; align-items:center; gap:5px; flex-shrink:0; }
  .db-cell b { color:#fff; }
  #dbg-status { font-weight:bold; color:#fa0; }
  #dbg-status.ok  { color:#0f0; }
  #dbg-status.err { color:#f44; }
  #dbg-alerts { color:#8cf; font-size:10px; flex:1; padding:0 10px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .db-btn { flex-shrink:0; margin:0 3px; background:#1a3a1a; border:1px solid #0f0; color:#0f0; font:11px 'Courier New',monospace; padding:3px 10px; cursor:pointer; border-radius:2px; }
  .db-btn:hover { background:#0f0; color:#000; }
  .db-btn.red { background:#3a1a1a; border-color:#f44; color:#f44; }
  .db-btn.red:hover { background:#f44; color:#fff; }

  /* ── TICKER ── */
  #ticker-wrap {
    position:fixed; bottom:0; left:0; width:1920px; height:60px;
    display:flex; align-items:stretch;
    opacity:0; transform:translateY(100%);
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  #ticker-wrap.visible { opacity:1; transform:translateY(0); }

  #alert-label {
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    padding:0 22px 0 16px; font-size:15px; font-weight:900;
    letter-spacing:0.12em; text-transform:uppercase; white-space:nowrap;
    gap:7px; position:relative; z-index:2; min-width:172px;
  }
  #alert-label::after {
    content:''; position:absolute; right:-13px; top:0; bottom:0;
    width:26px; background:inherit; clip-path:polygon(0 0,100% 50%,0 100%);
  }
  .icon { font-size:20px; }

  #ticker-track-wrap { flex:1; overflow:hidden; display:flex; align-items:center; padding-left:20px; }
  #ticker-track { display:flex; align-items:center; white-space:nowrap; will-change:transform; }
  .ticker-item  { display:inline-flex; align-items:center; padding-right:60px; font-size:21px; font-weight:600; letter-spacing:0.02em; }
  .ticker-event { font-weight:900; margin-right:10px; opacity:0.85; }
  .ticker-sep   { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:60px; flex-shrink:0; opacity:0.5; }

  #ticker-time {
    flex-shrink:0; display:flex; align-items:center; padding:0 14px;
    font-size:13px; font-weight:500; font-family:'Barlow',sans-serif;
    letter-spacing:0.08em; opacity:0.8; white-space:nowrap;
    border-left:1px solid rgba(255,255,255,0.2); min-width:86px;
  }

  /* ── Severity themes ── */
  .sev-extreme  #alert-label        { background:#c0001a; color:#fff; animation:pulse 1.1s ease-in-out infinite; }
  .sev-extreme  #alert-label::after { background:#c0001a; }
  .sev-extreme  #ticker-track-wrap  { background:#160003; color:#ffb0b8; }
  .sev-extreme  #ticker-time        { background:#160003; color:#ffb0b8; }
  .sev-extreme  .ticker-sep         { background:#ff3344; }
  .sev-extreme  .ticker-event       { color:#ff6677; }

  .sev-severe   #alert-label        { background:#e85d00; color:#fff; }
  .sev-severe   #alert-label::after { background:#e85d00; }
  .sev-severe   #ticker-track-wrap  { background:#180800; color:#ffc490; }
  .sev-severe   #ticker-time        { background:#180800; color:#ffc490; }
  .sev-severe   .ticker-sep         { background:#ff8c38; }
  .sev-severe   .ticker-event       { color:#ff8c38; }

  .sev-moderate #alert-label        { background:#c49a00; color:#100e00; }
  .sev-moderate #alert-label::after { background:#c49a00; }
  .sev-moderate #ticker-track-wrap  { background:#161200; color:#ffe57a; }
  .sev-moderate #ticker-time        { background:#161200; color:#ffe57a; }
  .sev-moderate .ticker-sep         { background:#c49a00; }
  .sev-moderate .ticker-event       { color:#ffd000; }

  .sev-minor    #alert-label        { background:#1255a8; color:#fff; }
  .sev-minor    #alert-label::after { background:#1255a8; }
  .sev-minor    #ticker-track-wrap  { background:#020810; color:#9eceff; }
  .sev-minor    #ticker-time        { background:#020810; color:#9eceff; }
  .sev-minor    .ticker-sep         { background:#3d80d8; }
  .sev-minor    .ticker-event       { color:#5ba8ff; }

  .sev-unknown  #alert-label        { background:#383838; color:#fff; }
  .sev-unknown  #alert-label::after { background:#383838; }
  .sev-unknown  #ticker-track-wrap  { background:#0e0e0e; color:#bbb; }
  .sev-unknown  #ticker-time        { background:#0e0e0e; color:#bbb; }
  .sev-unknown  .ticker-sep         { background:#666; }
  .sev-unknown  .ticker-event       { color:#999; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
  CONFIG

  STATES   : 2-letter state codes to monitor. Pulls ALL alerts
             for each state in a single API call — catches both
             INZ forecast zones AND INC county-level alerts.
             Add as many states as you want: ["IN","IL","OH"]

  FILTER_COUNTIES : Optional. If set, only shows alerts that
             affect these county/zone codes. Leave empty [] to
             show ALL alerts statewide.
             Example: ["INC089","INC091","INZ001","INZ009"]
             Find your county codes at alerts.weather.gov

  POLL_MS  : How often to refresh (ms). 60000 = 1 minute.
  SPEED_PX : Ticker scroll speed pixels/second.
  DEBUG    : true = show debug bar | false = hide for stream.
═══════════════════════════════════════════════════════════════ -->
<script>
const CONFIG = {
  STATES          : ["IN"],
  FILTER_COUNTIES : [],        // leave empty for all statewide alerts
  POLL_MS         : 60000,
  SPEED_PX        : 85,
  DEBUG           : true
};
</script>

<!-- Debug bar -->
<div id="debug-bar">
  <div class="db-cell">NWS v4</div>
  <div class="db-cell">STATE: <b id="dbg-state">-</b></div>
  <div class="db-cell">STATUS: <span id="dbg-status">INIT</span></div>
  <div class="db-cell">ALERTS: <b id="dbg-count">-</b></div>
  <div class="db-cell">METHOD: <b id="dbg-method">-</b></div>
  <div class="db-cell">POLL: <b id="dbg-time">-</b></div>
  <div id="dbg-alerts">—</div>
  <button class="db-btn" onclick="testAlert('moderate')">▶ WATCH</button>
  <button class="db-btn" onclick="testAlert('severe')">▶ WARNING</button>
  <button class="db-btn" onclick="testAlert('extreme')">▶ EMERGENCY</button>
  <button class="db-btn red" onclick="clearTest()">✕</button>
</div>

<!-- Ticker -->
<div id="ticker-wrap" class="sev-unknown">
  <div id="alert-label">
    <span class="icon" id="alert-icon">⚠</span>
    <span id="alert-type-label">ALERT</span>
  </div>
  <div id="ticker-track-wrap">
    <div id="ticker-track"></div>
  </div>
  <div id="ticker-time"></div>
</div>

<script>
// ── Severity ──────────────────────────────────────────────────────
const SEV_META = {
  extreme : {cls:'sev-extreme',  icon:'🌪', label:'EMERGENCY'},
  severe  : {cls:'sev-severe',   icon:'⛈', label:'WARNING'  },
  moderate: {cls:'sev-moderate', icon:'⚠️', label:'WATCH'    },
  minor   : {cls:'sev-minor',    icon:'ℹ️', label:'ADVISORY' },
  unknown : {cls:'sev-unknown',  icon:'📡', label:'ALERT'    }
};
const SEV_ORDER = ['extreme','severe','moderate','minor','unknown'];
const SEV_KW = {
  extreme : ['tornado warning','flash flood emergency','particularly dangerous situation','pds tornado'],
  severe  : ['severe thunderstorm warning','flash flood warning','winter storm warning','blizzard warning',
             'ice storm warning','high wind warning','hurricane warning','red flag warning','tornado watch'],
  moderate: ['watch','wind advisory','freeze','frost advisory','dense fog','heat advisory',
             'winter weather advisory','lake wind advisory','small craft','special weather statement']
};

function classify(a) {
  const combo = ((a.properties.event||'')+(a.properties.headline||'')).toLowerCase();
  for (const sev of ['extreme','severe','moderate'])
    if (SEV_KW[sev].some(k => combo.includes(k))) return sev;
  const raw = (a.properties.severity||'').toLowerCase();
  return SEV_ORDER.includes(raw) ? raw : 'unknown';
}
function topSev(alerts) {
  let best = 'unknown';
  for (const a of alerts) { const s = classify(a); if (SEV_ORDER.indexOf(s) < SEV_ORDER.indexOf(best)) best = s; }
  return best;
}

// ── Best display text ─────────────────────────────────────────────
function getAlertText(a) {
  const p = a.properties;
  const event = (p.event || 'Weather Alert').toUpperCase();
  const headline = (p.headline || '').trim();
  const desc     = (p.description || '').trim();
  const area     = (p.areaDesc || '').trim();

  if (headline.length > 10) return { event, text: headline };
  if (desc.length > 10) {
    const first = desc.replace(/\n+/g,' ').split(/\.\s+/)[0].trim();
    return { event, text: first + (first.endsWith('.') ? '' : '.') };
  }
  return { event, text: area || 'No details available.' };
}

// ── Debug ─────────────────────────────────────────────────────────
function dbg(msg, cls, count, method, alertList) {
  if (!CONFIG.DEBUG) return;
  const el = document.getElementById('dbg-status');
  el.textContent = msg; el.className = cls||'';
  if (count !== undefined) document.getElementById('dbg-count').textContent = count;
  if (method) document.getElementById('dbg-method').textContent = method;
  document.getElementById('dbg-time').textContent =
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if (alertList !== undefined)
    document.getElementById('dbg-alerts').textContent =
      alertList.length ? alertList.map(a=>'['+( a.properties.event||'?')+']').join(' ') : '— no alerts —';
}
document.getElementById('dbg-state').textContent = CONFIG.STATES.join('+');
if (!CONFIG.DEBUG) document.getElementById('debug-bar').style.display = 'none';

// ── Ticker animation ──────────────────────────────────────────────
let raf=null, rafStart=null, rafLoop=0;

function buildTrack(alerts) {
  const track = document.getElementById('ticker-track');
  track.innerHTML = '';
  for (let pass=0; pass<2; pass++) {
    alerts.forEach((a, i) => {
      const {event, text} = getAlertText(a);
      const item = document.createElement('span');
      item.className = 'ticker-item';
      const evSpan = document.createElement('span');
      evSpan.className = 'ticker-event';
      evSpan.textContent = event + ':';
      item.appendChild(evSpan);
      item.appendChild(document.createTextNode(' ' + text));
      track.appendChild(item);
      if (i < alerts.length-1 || pass===0) {
        const sep = document.createElement('span');
        sep.className = 'ticker-sep';
        track.appendChild(sep);
      }
    });
  }
  track.getBoundingClientRect();
  return track.scrollWidth / 2;
}

function startTicker(w) {
  if (raf) cancelAnimationFrame(raf);
  rafStart=null; rafLoop=Math.max(w,1);
  function step(ts) {
    if (!rafStart) rafStart=ts;
    const pos = ((ts-rafStart)/1000 * CONFIG.SPEED_PX) % rafLoop;
    document.getElementById('ticker-track').style.transform = `translateX(-${pos}px)`;
    raf = requestAnimationFrame(step);
  }
  raf = requestAnimationFrame(step);
}

function showAlerts(alerts) {
  const wrap = document.getElementById('ticker-wrap');
  const sev  = topSev(alerts);
  const meta = SEV_META[sev];
  wrap.className = 'visible ' + meta.cls;
  document.getElementById('alert-icon').textContent       = meta.icon;
  document.getElementById('alert-type-label').textContent = meta.label;
  document.getElementById('ticker-time').textContent =
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  setTimeout(() => startTicker(buildTrack(alerts)), 120);
}

function hideAlerts() {
  document.getElementById('ticker-wrap').classList.remove('visible');
  if (raf) { cancelAnimationFrame(raf); raf=null; }
  dbg('NO ACTIVE ALERTS','',0,undefined,[]);
}

// ── Test alerts ───────────────────────────────────────────────────
const TESTS = {
  moderate:[{id:'T1',properties:{event:'Severe Thunderstorm Watch',headline:'Severe Thunderstorm Watch 312 in effect until 11:00 PM CDT for Northern and Central Indiana. Large hail up to 2 inches and damaging winds to 70 mph possible.',areaDesc:'Lake County IN; Porter County IN',severity:'Moderate'}}],
  severe:  [{id:'T1',properties:{event:'Severe Thunderstorm Watch',headline:'Severe Thunderstorm Watch 312 in effect until 11:00 PM CDT. Large hail and damaging winds.',areaDesc:'Lake IN',severity:'Severe'}},
            {id:'T2',properties:{event:'Tornado Watch',headline:'Tornado Watch 199 in effect until 2:00 AM CDT. Atmospheric conditions favorable for tornado development.',areaDesc:'Porter County IN',severity:'Severe'}}],
  extreme: [{id:'T1',properties:{event:'Tornado Warning',headline:'TORNADO WARNING in effect until 8:47 PM CDT. Radar-confirmed tornado near Valparaiso moving NE at 45 mph. TAKE SHELTER NOW.',areaDesc:'Porter County IN',severity:'Extreme'}},
            {id:'T2',properties:{event:'Severe Thunderstorm Warning',headline:'Severe Thunderstorm Warning until 9:00 PM CDT. 70 mph winds and golf ball sized hail.',areaDesc:'Lake County IN',severity:'Severe'}}]
};
function testAlert(l) { showAlerts(TESTS[l]); dbg('TEST:'+l.toUpperCase(),'ok',TESTS[l].length,'MANUAL',TESTS[l]); }
function clearTest()  { hideAlerts(); }

// ── NWS State-level fetch ─────────────────────────────────────────
// Uses ?area=IN — one call returns ALL alerts for the state,
// covering both INZ forecast zones and INC county codes.
const PROXY1 = 'https://corsproxy.io/?';
const PROXY2 = 'https://api.allorigins.win/get?url=';
let lastMethod = null;

async function fetchStateAlerts(state) {
  const url = `https://api.weather.gov/alerts/active?area=${state}`;
  const methods = [
    ['DIRECT', async () => {
      const r = await fetch(url, {headers:{'Accept':'application/geo+json','User-Agent':'OBS-WeatherTicker/4.0'}});
      if (!r.ok) throw new Error('HTTP '+r.status);
      return (await r.json()).features || [];
    }],
    ['PROXY1', async () => {
      const r = await fetch(PROXY1 + encodeURIComponent(url));
      if (!r.ok) throw new Error('P1 '+r.status);
      return (await r.json()).features || [];
    }],
    ['PROXY2', async () => {
      const r = await fetch(PROXY2 + encodeURIComponent(url));
      if (!r.ok) throw new Error('P2 '+r.status);
      const outer = await r.json();
      return JSON.parse(outer.contents).features || [];
    }]
  ];

  // Try last working method first for speed
  const ordered = lastMethod
    ? [methods.find(m=>m[0]===lastMethod), ...methods.filter(m=>m[0]!==lastMethod)].filter(Boolean)
    : methods;

  for (const [name, fn] of ordered) {
    try {
      const results = await fn();
      lastMethod = name;
      return { results, method: name };
    } catch(e) { /* try next */ }
  }
  return { results: [], method: 'FAILED' };
}

async function poll() {
  dbg('POLLING...','');
  try {
    let all = [];
    for (const state of CONFIG.STATES) {
      const {results, method} = await fetchStateAlerts(state);
      dbg('OK','ok', undefined, method);
      all = all.concat(results);
    }

    // Deduplicate by alert ID
    const seen = new Set();
    all = all.filter(a => { if(seen.has(a.id)) return false; seen.add(a.id); return true; });

    // Optional county/zone filter
    if (CONFIG.FILTER_COUNTIES.length > 0) {
      all = all.filter(a => {
        const zones = (a.properties.affectedZones || []).map(z => z.split('/').pop());
        return CONFIG.FILTER_COUNTIES.some(f => zones.includes(f));
      });
    }

    // Skip test/exercise alerts
    all = all.filter(a => (a.properties.status||'').toLowerCase() !== 'test'
                       && (a.properties.status||'').toLowerCase() !== 'exercise');

    dbg('OK','ok', all.length, lastMethod, all);

    if (all.length > 0) showAlerts(all);
    else hideAlerts();
  } catch(e) {
    dbg('ERROR','err', '-', null, []);
  }
}

poll();
setInterval(poll, CONFIG.POLL_MS);
</script>
</body>
</html>
